name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Navigate to the project directory (make sure it exists)
            cd /home/ubuntu/Trrip || exit 1
            
            # Pull the latest code
            git pull origin main
            
            # Install and build the frontend
            cd client
            npm install
            npm run build
            
            # Install backend dependencies
            cd ../server
            npm install
            
            # Restart the Node server using PM2
            export NODE_ENV=production
            pm2 restart trripp-api --update-env || pm2 start src/server.js --name "trripp-api"
